// sctp.proto
syntax = "proto3";

package webrtc;

// RFC 4960 — Stream Control Transmission Protocol (SCTP)
// https://www.rfc-editor.org/rfc/rfc4960
//
// Encoding conventions (same as dcep.proto):
//
//   Semantic fixed-length fields  → exported enum, sentinel one past
//                                   the wire range to force wide encoding
//   Non-semantic fixed-length     → smallest uint that covers the wire
//                                   width; proto3 has no uint8/uint16,
//                                   so uint32 covers fields up to 4 bytes.
//   Flags bytes                   → nested Flags message with one bool
//                                   per bit; reserved bits get _N names
//                                   matching their field number (bit
//                                   position); named bits get their RFC
//                                   label. Field numbers 1–8 map to bit
//                                   positions 7–0 (MSB first).
//   Length / count framing fields → nested wrapper message so gRPC
//                                   consumers may ignore them; bridge
//                                   serializers recompute or honour
//   Field numbering on the parent → mirrors the RFC wire layout order

// ═══════════════════════════════════════════════════════════════
// Enums
// ═══════════════════════════════════════════════════════════════

// Section 3.2 — Chunk Type
// Wire: 1 byte unsigned (0x00–0xfe), 0xff reserved
enum SCTPChunkType {
  SCTP_CHUNK_DATA              = 0;
  SCTP_CHUNK_INIT              = 1;
  SCTP_CHUNK_INIT_ACK          = 2;
  SCTP_CHUNK_SACK              = 3;
  SCTP_CHUNK_HEARTBEAT         = 4;
  SCTP_CHUNK_HEARTBEAT_ACK     = 5;
  SCTP_CHUNK_ABORT             = 6;
  SCTP_CHUNK_SHUTDOWN          = 7;
  SCTP_CHUNK_SHUTDOWN_ACK      = 8;
  SCTP_CHUNK_ERROR             = 9;
  SCTP_CHUNK_COOKIE_ECHO       = 10;
  SCTP_CHUNK_COOKIE_ACK        = 11;
  SCTP_CHUNK_ECNE              = 12;
  SCTP_CHUNK_CWR               = 13;
  SCTP_CHUNK_SHUTDOWN_COMPLETE = 14;
  SCTP_CHUNK_AUTH              = 15;  // RFC 4895
  SCTP_CHUNK_I_DATA            = 64;  // RFC 8260
  SCTP_CHUNK_ASCONF_ACK        = 128; // RFC 5061
  SCTP_CHUNK_RE_CONFIG         = 130; // RFC 6525
  SCTP_CHUNK_PAD               = 132; // RFC 4820
  SCTP_CHUNK_FORWARD_TSN       = 192; // RFC 3758
  SCTP_CHUNK_ASCONF            = 193; // RFC 5061
  SCTP_CHUNK_I_FORWARD_TSN     = 194; // RFC 8260
  SCTP_CHUNK_TYPE_SENTINEL     = 256;
}

// Section 3.2.1 — Parameter Type
// Wire: 2 bytes unsigned (0x0000–0xfffe), 0xffff reserved
enum SCTPParameterType {
  _SCTP_PARAM_0                    = 0;
  SCTP_PARAM_HEARTBEAT_INFO        = 1;
  SCTP_PARAM_IPV4_ADDRESS          = 5;
  SCTP_PARAM_IPV6_ADDRESS          = 6;
  SCTP_PARAM_STATE_COOKIE          = 7;
  SCTP_PARAM_UNRECOGNIZED          = 8;
  SCTP_PARAM_COOKIE_PRESERVATIVE   = 9;
  SCTP_PARAM_HOST_NAME             = 11;
  SCTP_PARAM_SUPPORTED_ADDR_TYPES  = 12;
  SCTP_PARAM_OUTGOING_SSN_RESET    = 13;  // RFC 6525
  SCTP_PARAM_INCOMING_SSN_RESET    = 14;  // RFC 6525
  SCTP_PARAM_SSN_TSN_RESET         = 15;  // RFC 6525
  SCTP_PARAM_RECONFIG_RESPONSE     = 16;  // RFC 6525
  SCTP_PARAM_ADD_OUTGOING_STREAMS  = 17;  // RFC 6525
  SCTP_PARAM_ADD_INCOMING_STREAMS  = 18;  // RFC 6525
  SCTP_PARAM_ECN_CAPABLE           = 32768; // 0x8000
  SCTP_PARAM_RANDOM                = 32770; // 0x8002, RFC 4895
  SCTP_PARAM_CHUNK_LIST            = 32771; // 0x8003, RFC 4895
  SCTP_PARAM_HMAC_ALGO             = 32772; // 0x8004, RFC 4895
  SCTP_PARAM_PADDING               = 32773; // 0x8005, RFC 4820
  SCTP_PARAM_SUPPORTED_EXTENSIONS  = 32776; // 0x8008, RFC 5061
  SCTP_PARAM_FORWARD_TSN_SUPPORTED = 49152; // 0xC000, RFC 3758
  SCTP_PARAM_ADD_IP_ADDRESS        = 49153; // 0xC001, RFC 5061
  SCTP_PARAM_DELETE_IP_ADDRESS     = 49154; // 0xC002, RFC 5061
  SCTP_PARAM_ERROR_CAUSE_INDICATION = 49155; // 0xC003, RFC 5061
  SCTP_PARAM_SET_PRIMARY_ADDRESS   = 49156; // 0xC004, RFC 5061
  SCTP_PARAM_SUCCESS_INDICATION    = 49157; // 0xC005, RFC 5061
  SCTP_PARAM_ADAPTATION_LAYER_IND  = 49158; // 0xC006, RFC 5061
  SCTP_PARAM_TYPE_SENTINEL         = 65536;
}

// Section 3.3.10 — Error Cause Code
// Wire: 2 bytes unsigned
enum SCTPErrorCauseCode {
  _SCTP_CAUSE_0                            = 0;
  SCTP_CAUSE_INVALID_STREAM_ID             = 1;
  SCTP_CAUSE_MISSING_MANDATORY_PARAM       = 2;
  SCTP_CAUSE_STALE_COOKIE                  = 3;
  SCTP_CAUSE_OUT_OF_RESOURCE               = 4;
  SCTP_CAUSE_UNRESOLVABLE_ADDRESS          = 5;
  SCTP_CAUSE_UNRECOGNIZED_CHUNK_TYPE       = 6;
  SCTP_CAUSE_INVALID_MANDATORY_PARAM       = 7;
  SCTP_CAUSE_UNRECOGNIZED_PARAMETERS       = 8;
  SCTP_CAUSE_NO_USER_DATA                  = 9;
  SCTP_CAUSE_COOKIE_WHILE_SHUTTING_DOWN    = 10;
  SCTP_CAUSE_RESTART_WITH_NEW_ADDRESSES    = 11;
  SCTP_CAUSE_USER_INITIATED_ABORT          = 12;
  SCTP_CAUSE_PROTOCOL_VIOLATION            = 13;
  SCTP_CAUSE_UNSUPPORTED_HMAC_ID           = 261; // 0x0105, RFC 4895
  SCTP_CAUSE_CODE_SENTINEL                 = 65536;
}

// ═══════════════════════════════════════════════════════════════
// Common header
// ═══════════════════════════════════════════════════════════════

// Section 3.1
message SCTPCommonHeader {
  // Wire: 2 bytes unsigned. uint32 because proto3 has no uint16.
  uint32 source_port = 1;
  uint32 destination_port = 2;
  // Wire: 4 bytes unsigned.
  uint32 verification_tag = 3;
  // Wire: 4 bytes unsigned. CRC32c.
  uint32 checksum = 4;
}

// ═══════════════════════════════════════════════════════════════
// Length / count wrappers
// ═══════════════════════════════════════════════════════════════

message ChunkLength {
  uint32 length = 1;
}

message ParameterLength {
  uint32 length = 1;
}

message CauseLength {
  uint32 length = 1;
}

message NumberOfGapAckBlocks {
  uint32 count = 1;
}

message NumberOfDuplicateTSNs {
  uint32 count = 1;
}

message NumberOfMissingParams {
  uint32 count = 1;
}

// ═══════════════════════════════════════════════════════════════
// Sub-structures
// ═══════════════════════════════════════════════════════════════

message GapAckBlock {
  uint32 start = 1;
  uint32 end = 2;
}

// Fully-reserved flags byte. Used by most chunks.
// Field numbers 1–8 → bit positions 7–0.
message Flags {
  bool _1 = 1;
  bool _2 = 2;
  bool _3 = 3;
  bool _4 = 4;
  bool _5 = 5;
  bool _6 = 6;
  bool _7 = 7;
  bool _8 = 8;
}

// ═══════════════════════════════════════════════════════════════
// TLV Parameter messages
// ═══════════════════════════════════════════════════════════════

message IPv4AddressParameter {
  SCTPParameterType parameter_type = 1;
  ParameterLength parameter_length = 2;
  bytes ipv4_address = 3;
}

message IPv6AddressParameter {
  SCTPParameterType parameter_type = 1;
  ParameterLength parameter_length = 2;
  bytes ipv6_address = 3;
}

message CookiePreservativeParameter {
  SCTPParameterType parameter_type = 1;
  ParameterLength parameter_length = 2;
  uint32 suggested_cookie_life_span_increment = 3;
}

message HostNameParameter {
  SCTPParameterType parameter_type = 1;
  ParameterLength parameter_length = 2;
  string host_name = 3;
}

message SupportedAddressTypesParameter {
  SCTPParameterType parameter_type = 1;
  ParameterLength parameter_length = 2;
  repeated uint32 address_types = 3;
}

message ECNCapableParameter {
  SCTPParameterType parameter_type = 1;
  ParameterLength parameter_length = 2;
}

message StateCookieParameter {
  SCTPParameterType parameter_type = 1;
  ParameterLength parameter_length = 2;
  bytes cookie = 3;
}

message UnrecognizedParameter {
  SCTPParameterType parameter_type = 1;
  ParameterLength parameter_length = 2;
  bytes unrecognized_parameters = 3;
}

message HeartbeatInfoParameter {
  SCTPParameterType parameter_type = 1;
  ParameterLength parameter_length = 2;
  bytes sender_specific_heartbeat_info = 3;
}

// ═══════════════════════════════════════════════════════════════
// Error Cause messages (Section 3.3.10)
// ═══════════════════════════════════════════════════════════════

message InvalidStreamIdentifierCause {
  SCTPErrorCauseCode cause_code = 1;
  CauseLength cause_length = 2;
  uint32 stream_identifier = 3;
  bytes reserved = 4;
}

message MissingMandatoryParameterCause {
  SCTPErrorCauseCode cause_code = 1;
  CauseLength cause_length = 2;
  NumberOfMissingParams number_of_missing_params = 3;
  repeated uint32 missing_param_types = 4;
}

message StaleCookieCause {
  SCTPErrorCauseCode cause_code = 1;
  CauseLength cause_length = 2;
  uint32 measure_of_staleness = 3;
}

message OutOfResourceCause {
  SCTPErrorCauseCode cause_code = 1;
  CauseLength cause_length = 2;
}

message UnresolvableAddressCause {
  SCTPErrorCauseCode cause_code = 1;
  CauseLength cause_length = 2;
  bytes unresolvable_address = 3;
}

message UnrecognizedChunkTypeCause {
  SCTPErrorCauseCode cause_code = 1;
  CauseLength cause_length = 2;
  bytes unrecognized_chunk = 3;
}

message InvalidMandatoryParameterCause {
  SCTPErrorCauseCode cause_code = 1;
  CauseLength cause_length = 2;
}

message UnrecognizedParametersCause {
  SCTPErrorCauseCode cause_code = 1;
  CauseLength cause_length = 2;
  bytes unrecognized_parameters = 3;
}

message NoUserDataCause {
  SCTPErrorCauseCode cause_code = 1;
  CauseLength cause_length = 2;
  uint32 tsn = 3;
}

message CookieWhileShuttingDownCause {
  SCTPErrorCauseCode cause_code = 1;
  CauseLength cause_length = 2;
}

message RestartWithNewAddressesCause {
  SCTPErrorCauseCode cause_code = 1;
  CauseLength cause_length = 2;
  bytes new_address_tlvs = 3;
}

message UserInitiatedAbortCause {
  SCTPErrorCauseCode cause_code = 1;
  CauseLength cause_length = 2;
  bytes upper_layer_abort_reason = 3;
}

message ProtocolViolationCause {
  SCTPErrorCauseCode cause_code = 1;
  CauseLength cause_length = 2;
  bytes additional_information = 3;
}

message UnsupportedHMACIdentifierCause {
  SCTPErrorCauseCode cause_code = 1;
  CauseLength cause_length = 2;
  uint32 hmac_identifier = 3;
}

message ErrorCause {
  oneof cause {
    InvalidStreamIdentifierCause    invalid_stream_id          = 1;
    MissingMandatoryParameterCause  missing_mandatory_param    = 2;
    StaleCookieCause                stale_cookie               = 3;
    OutOfResourceCause              out_of_resource            = 4;
    UnresolvableAddressCause        unresolvable_address       = 5;
    UnrecognizedChunkTypeCause      unrecognized_chunk_type    = 6;
    InvalidMandatoryParameterCause  invalid_mandatory_param    = 7;
    UnrecognizedParametersCause     unrecognized_parameters    = 8;
    NoUserDataCause                 no_user_data               = 9;
    CookieWhileShuttingDownCause    cookie_while_shutting_down = 10;
    RestartWithNewAddressesCause    restart_with_new_addresses = 11;
    UserInitiatedAbortCause         user_initiated_abort       = 12;
    ProtocolViolationCause          protocol_violation         = 13;
    UnsupportedHMACIdentifierCause  unsupported_hmac_id        = 14;
  }
}

// ═══════════════════════════════════════════════════════════════
// Chunk messages — RFC 4960 base + Appendix A (ECNE, CWR)
// ═══════════════════════════════════════════════════════════════

// Section 3.3.1 — Payload Data (DATA) (0)
//
// Flags byte: [Reserved(4)][I(1)][U(1)][B(1)][E(1)]
// I bit from RFC 9260 IANA registry (0x08).
message DataChunk {
  message Flags {
    bool _1 = 1;
    bool _2 = 2;
    bool _3 = 3;
    bool _4 = 4;
    bool immediate = 5;
    bool unordered = 6;
    bool beginning = 7;
    bool ending = 8;
  }

  SCTPChunkType chunk_type = 1;
  Flags flags = 2;
  ChunkLength chunk_length = 3;
  uint32 tsn = 4;
  // Wire: 2 bytes unsigned. uint32 because proto3 has no uint16.
  uint32 stream_identifier = 5;
  // Wire: 2 bytes unsigned. Valid 0–65535. Ignored when unordered=true.
  uint32 stream_sequence_number = 6;
  // Wire: 4 bytes unsigned. Opaque to SCTP, byte order NOT converted.
  uint32 payload_protocol_identifier = 7;
  bytes user_data = 8;
}

// Section 3.3.2 — Initiation (INIT) (1)
// Flags: all reserved.
message InitChunk {
  message Flags {
    bool _1 = 1;
    bool _2 = 2;
    bool _3 = 3;
    bool _4 = 4;
    bool _5 = 5;
    bool _6 = 6;
    bool _7 = 7;
    bool _8 = 8;
  }
  SCTPChunkType chunk_type = 1;
  Flags flags = 2;
  ChunkLength chunk_length = 3;
  uint32 initiate_tag = 4;
  uint32 a_rwnd = 5;
  uint32 number_of_outbound_streams = 6;
  uint32 number_of_inbound_streams = 7;
  uint32 initial_tsn = 8;
  repeated IPv4AddressParameter ipv4_addresses = 9;
  repeated IPv6AddressParameter ipv6_addresses = 10;
  CookiePreservativeParameter cookie_preservative = 11;
  ECNCapableParameter ecn_capable = 12;
  HostNameParameter host_name = 13;
  SupportedAddressTypesParameter supported_address_types = 14;
}

// Section 3.3.3 — Initiation Acknowledgement (INIT ACK) (2)
// Flags: all reserved.
message InitAckChunk {
  message Flags {
    bool _1 = 1;
    bool _2 = 2;
    bool _3 = 3;
    bool _4 = 4;
    bool _5 = 5;
    bool _6 = 6;
    bool _7 = 7;
    bool _8 = 8;
  }
  SCTPChunkType chunk_type = 1;
  Flags flags = 2;
  ChunkLength chunk_length = 3;
  uint32 initiate_tag = 4;
  uint32 a_rwnd = 5;
  uint32 number_of_outbound_streams = 6;
  uint32 number_of_inbound_streams = 7;
  uint32 initial_tsn = 8;
  StateCookieParameter state_cookie = 9;
  repeated IPv4AddressParameter ipv4_addresses = 10;
  repeated IPv6AddressParameter ipv6_addresses = 11;
  UnrecognizedParameter unrecognized_parameter = 12;
  ECNCapableParameter ecn_capable = 13;
  HostNameParameter host_name = 14;
}

// Section 3.3.4 — Selective Acknowledgement (SACK) (3)
// Flags: all reserved.
message SackChunk {
  message Flags {
    bool _1 = 1;
    bool _2 = 2;
    bool _3 = 3;
    bool _4 = 4;
    bool _5 = 5;
    bool _6 = 6;
    bool _7 = 7;
    bool _8 = 8;
  }
  SCTPChunkType chunk_type = 1;
  Flags flags = 2;
  ChunkLength chunk_length = 3;
  uint32 cumulative_tsn_ack = 4;
  uint32 a_rwnd = 5;
  NumberOfGapAckBlocks number_of_gap_ack_blocks = 6;
  NumberOfDuplicateTSNs number_of_duplicate_tsns = 7;
  repeated GapAckBlock gap_ack_blocks = 8;
  repeated uint32 duplicate_tsns = 9;
}

// Section 3.3.5 — Heartbeat Request (HEARTBEAT) (4)
// Flags: all reserved.
message HeartbeatChunk {
  message Flags {
    bool _1 = 1;
    bool _2 = 2;
    bool _3 = 3;
    bool _4 = 4;
    bool _5 = 5;
    bool _6 = 6;
    bool _7 = 7;
    bool _8 = 8;
  }
  SCTPChunkType chunk_type = 1;
  Flags flags = 2;
  ChunkLength chunk_length = 3;
  HeartbeatInfoParameter heartbeat_info = 4;
}

// Section 3.3.6 — Heartbeat Acknowledgement (HEARTBEAT ACK) (5)
// Flags: all reserved.
message HeartbeatAckChunk {
  message Flags {
    bool _1 = 1;
    bool _2 = 2;
    bool _3 = 3;
    bool _4 = 4;
    bool _5 = 5;
    bool _6 = 6;
    bool _7 = 7;
    bool _8 = 8;
  }
  SCTPChunkType chunk_type = 1;
  Flags flags = 2;
  ChunkLength chunk_length = 3;
  HeartbeatInfoParameter heartbeat_info = 4;
}

// Section 3.3.7 — Abort Association (ABORT) (6)
// Flags: [Reserved(7)][T(1)]
message AbortChunk {
  message Flags {
    bool _1 = 1;
    bool _2 = 2;
    bool _3 = 3;
    bool _4 = 4;
    bool _5 = 5;
    bool _6 = 6;
    bool _7 = 7;
    bool t_bit = 8;
  }

  SCTPChunkType chunk_type = 1;
  Flags flags = 2;
  ChunkLength chunk_length = 3;
  repeated ErrorCause error_causes = 4;
}

// Section 3.3.8 — Shutdown Association (SHUTDOWN) (7)
// Flags: all reserved.
message ShutdownChunk {
  message Flags {
    bool _1 = 1;
    bool _2 = 2;
    bool _3 = 3;
    bool _4 = 4;
    bool _5 = 5;
    bool _6 = 6;
    bool _7 = 7;
    bool _8 = 8;
  }
  SCTPChunkType chunk_type = 1;
  Flags flags = 2;
  ChunkLength chunk_length = 3;
  uint32 cumulative_tsn_ack = 4;
}

// Section 3.3.9 — Shutdown Acknowledgement (SHUTDOWN ACK) (8)
// Flags: all reserved.
message ShutdownAckChunk {
  message Flags {
    bool _1 = 1;
    bool _2 = 2;
    bool _3 = 3;
    bool _4 = 4;
    bool _5 = 5;
    bool _6 = 6;
    bool _7 = 7;
    bool _8 = 8;
  }
  SCTPChunkType chunk_type = 1;
  Flags flags = 2;
  ChunkLength chunk_length = 3;
}

// Section 3.3.10 — Operation Error (ERROR) (9)
// Flags: all reserved.
message ErrorChunk {
  message Flags {
    bool _1 = 1;
    bool _2 = 2;
    bool _3 = 3;
    bool _4 = 4;
    bool _5 = 5;
    bool _6 = 6;
    bool _7 = 7;
    bool _8 = 8;
  }
  SCTPChunkType chunk_type = 1;
  Flags flags = 2;
  ChunkLength chunk_length = 3;
  repeated ErrorCause error_causes = 4;
}

// Section 3.3.11 — Cookie Echo (COOKIE ECHO) (10)
// Flags: all reserved.
message CookieEchoChunk {
  message Flags {
    bool _1 = 1;
    bool _2 = 2;
    bool _3 = 3;
    bool _4 = 4;
    bool _5 = 5;
    bool _6 = 6;
    bool _7 = 7;
    bool _8 = 8;
  }
  SCTPChunkType chunk_type = 1;
  Flags flags = 2;
  ChunkLength chunk_length = 3;
  bytes cookie = 4;
}

// Section 3.3.12 — Cookie Acknowledgement (COOKIE ACK) (11)
// Flags: all reserved.
message CookieAckChunk {
  message Flags {
    bool _1 = 1;
    bool _2 = 2;
    bool _3 = 3;
    bool _4 = 4;
    bool _5 = 5;
    bool _6 = 6;
    bool _7 = 7;
    bool _8 = 8;
  }
  SCTPChunkType chunk_type = 1;
  Flags flags = 2;
  ChunkLength chunk_length = 3;
}

// Appendix A — ECNE (12)
// Flags: all reserved.
message EcneChunk {
  message Flags {
    bool _1 = 1;
    bool _2 = 2;
    bool _3 = 3;
    bool _4 = 4;
    bool _5 = 5;
    bool _6 = 6;
    bool _7 = 7;
    bool _8 = 8;
  }
  SCTPChunkType chunk_type = 1;
  Flags flags = 2;
  ChunkLength chunk_length = 3;
  uint32 lowest_tsn = 4;
}

// Appendix A — CWR (13)
// Flags: all reserved.
message CwrChunk {
  message Flags {
    bool _1 = 1;
    bool _2 = 2;
    bool _3 = 3;
    bool _4 = 4;
    bool _5 = 5;
    bool _6 = 6;
    bool _7 = 7;
    bool _8 = 8;
  }
  SCTPChunkType chunk_type = 1;
  Flags flags = 2;
  ChunkLength chunk_length = 3;
  uint32 lowest_tsn = 4;
}

// Section 3.3.13 — Shutdown Complete (SHUTDOWN COMPLETE) (14)
// Flags: [Reserved(7)][T(1)]
message ShutdownCompleteChunk {
  message Flags {
    bool _1 = 1;
    bool _2 = 2;
    bool _3 = 3;
    bool _4 = 4;
    bool _5 = 5;
    bool _6 = 6;
    bool _7 = 7;
    bool t_bit = 8;
  }

  SCTPChunkType chunk_type = 1;
  Flags flags = 2;
  ChunkLength chunk_length = 3;
}

// ═══════════════════════════════════════════════════════════════
// Top-level SCTP Packet
// ═══════════════════════════════════════════════════════════════

message SCTPChunk {
  oneof chunk {
    DataChunk              data              = 1;
    InitChunk              init              = 2;
    InitAckChunk           init_ack          = 3;
    SackChunk              sack              = 4;
    HeartbeatChunk         heartbeat         = 5;
    HeartbeatAckChunk      heartbeat_ack     = 6;
    AbortChunk             abort             = 7;
    ShutdownChunk          shutdown          = 8;
    ShutdownAckChunk       shutdown_ack      = 9;
    ErrorChunk             error             = 10;
    CookieEchoChunk        cookie_echo       = 11;
    CookieAckChunk         cookie_ack        = 12;
    EcneChunk              ecne              = 13;
    CwrChunk               cwr               = 14;
    ShutdownCompleteChunk  shutdown_complete  = 15;
    AuthChunk              auth              = 16;
    IDataChunk             i_data            = 17;
    AsconfAckChunk         asconf_ack        = 18;
    ReconfigChunk          reconfig          = 19;
    PadChunk               pad               = 20;
    ForwardTSNChunk        forward_tsn       = 21;
    AsconfChunk            asconf            = 22;
    IForwardTSNChunk       i_forward_tsn     = 23;
  }
}

message SCTPPacket {
  SCTPCommonHeader header = 1;
  repeated SCTPChunk chunks = 2;
}
